// Color scale: purple (old) → white (balanced) → orange-red (young)
function diffToColor(diff) {
  // diff range: -57 to +53
  const stops = [
    [-57, [124, 58, 237]],   // purple deep
    [-40, [139, 92, 246]],   // purple
    [-20, [167, 139, 250]],  // light purple
    [-5,  [196, 181, 253]],  // very light purple
    [0,   [226, 232, 240]],  // white/neutral
    [5,   [253, 230, 138]],  // light yellow
    [20,  [251, 191, 36]],   // yellow-orange
    [35,  [249, 115, 22]],   // orange
    [53,  [220, 38, 38]],    // red
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const [d0, c0] = stops[i];
    const [d1, c1] = stops[i + 1];
    if (diff >= d0 && diff <= d1) {
      const t = (diff - d0) / (d1 - d0);
      return [
        Math.round(c0[0] + t * (c1[0] - c0[0])),
        Math.round(c0[1] + t * (c1[1] - c0[1])),
        Math.round(c0[2] + t * (c1[2] - c0[2]))
      ];
    }
  }
  if (diff < -57) return [124, 58, 237];
  return [220, 38, 38];
}

function rgbToStr(rgb, alpha=1) {
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
}

function bubbleRadius(total) {
  // sqrt scale: min 5, max 45
  const mn = 1130, mx = 524516;
  const t = (Math.sqrt(total) - Math.sqrt(mn)) / (Math.sqrt(mx) - Math.sqrt(mn));
  return 5 + t * 40;
}

function formatNum(n) {
  return Math.round(n).toLocaleString('ko-KR');
}

// Init map
const map = L.map('map', {
  center: [36.5, 127.8],
  zoom: 7,
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Build bubbles
let circles = [];
let currentFilter = 'all';

function createCircles(data) {
  circles.forEach(c => map.removeLayer(c));
  circles = [];

  data.forEach(d => {
    const rgb = diffToColor(d.diff);
    const r = bubbleRadius(d.total);
    const color = rgbToStr(rgb);
    const fillColor = rgbToStr(rgb, 0.75);

    const circle = L.circleMarker([d.lat, d.lng], {
      radius: r,
      color: color,
      weight: 1.5,
      fillColor: fillColor,
      fillOpacity: 0.82,
    });

    const diffStr = d.diff > 0
      ? `<span class="young-color">청년 +${d.diff}%p 우세</span>`
      : d.diff < 0
      ? `<span class="old-color">노년 ${Math.abs(d.diff)}%p 우세</span>`
      : '균형';

    const bgColor = d.diff > 5 ? 'rgba(249,115,22,0.12)' : d.diff < -5 ? 'rgba(139,92,246,0.12)' : 'rgba(30,41,59,0.5)';
    const barTotal = d.young_pct + d.old_pct;
    const yW = (d.young_pct / barTotal * 100).toFixed(1);
    const oW = (d.old_pct / barTotal * 100).toFixed(1);

    circle.bindPopup(`
      <div class="popup-title">📍 ${d.name}</div>
      <div class="popup-grid">
        <div class="popup-card">
          <div class="popup-card-label">🔶 청년 (20~39세)</div>
          <div class="popup-card-value young-color">${d.young_pct}%</div>
          <div class="popup-card-sub">${formatNum(d.young)}명</div>
        </div>
        <div class="popup-card">
          <div class="popup-card-label">🔷 노년 (65세+)</div>
          <div class="popup-card-value old-color">${d.old_pct}%</div>
          <div class="popup-card-sub">${formatNum(d.old)}명</div>
        </div>
      </div>
      <div class="popup-bar-wrap">
        <div class="popup-bar-label"><span>청년 ${d.young_pct}%</span><span>노년 ${d.old_pct}%</span></div>
        <div class="popup-bar-bg">
          <div class="popup-bar-young" style="width:${yW}%"></div>
          <div class="popup-bar-old" style="width:${oW}%"></div>
        </div>
      </div>
      <div class="popup-diff" style="background:${bgColor}">${diffStr}</div>
      <div class="popup-total">1인가구 총수: <strong>${formatNum(d.total)}명</strong></div>
    `, { maxWidth: 260 });

    circle.addTo(map);
    circles.push(circle);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active', 'active-old');
  });

  let filtered;
  if (f === 'young') {
    filtered = DATA.filter(d => d.diff > 0);
    document.getElementById('btn-young').classList.add('active');
  } else if (f === 'old') {
    filtered = DATA.filter(d => d.diff < 0);
    document.getElementById('btn-old').classList.add('active-old');
  } else {
    filtered = DATA;
    document.getElementById('btn-all').classList.add('active');
  }

  createCircles(filtered);
  updateStats(filtered);
}

function updateStats(data) {
  const youngCount = DATA.filter(d => d.diff > 0).length;
  const oldCount = DATA.filter(d => d.diff < 0).length;
  document.getElementById('s-total').textContent = data.length + '개';
  document.getElementById('s-young').textContent = youngCount + '개';
  document.getElementById('s-old').textContent = oldCount + '개';

  const topYoung = [...DATA].sort((a,b) => b.diff - a.diff).slice(0,3);
  const topOld = [...DATA].sort((a,b) => a.diff - b.diff).slice(0,3);

  document.getElementById('s-top').innerHTML = `
    <span style="color:#94a3b8;font-weight:600;">🔶 청년 최우세</span>
    ${topYoung.map(d => `<span><strong style="color:#f97316">${d.name}</strong> (+${d.diff}%p)</span>`).join('')}
    <span style="color:#94a3b8;font-weight:600;margin-top:6px;display:block;">🔷 노년 최우세</span>
    ${topOld.map(d => `<span><strong style="color:#8b5cf6">${d.name}</strong> (${d.diff}%p)</span>`).join('')}
  `;
}

// Initialize
setFilter('all');
</script>
</body>
</html>
